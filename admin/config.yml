backend:
  name: git-gateway
  branch: main

locale: da

site_url: "https://birgitte-skovgaard.netlify.app"
show_preview_links: true

media_folder: "Assets"
public_folder: "/Assets"

collections:
  - name: "global"
    label: "Globalt indhold"
    editor:
      preview: false
    files:
      - name: "global"
        label: "Kontaktinfo, åbningstider & footer"
        file: "content/global.json"
        format: json
        fields:
          - label: "Kontaktoplysninger"
            name: "contact"
            widget: "object"
            collapsed: true
            hint: "Vises i footeren og på kontaktsiden"
            fields:
              - {label: "Telefon", name: "phone", widget: "string", hint: "Vises i header, footer og kontaktside"}
              - {label: "E-mail", name: "email", widget: "string", hint: "Vises i footer og kontaktside"}
              - {label: "Adresse", name: "address", widget: "string", hint: "Vises i footer og kontaktside"}
              - {label: "Parkeringsnote", name: "parking", widget: "string", hint: "Den lille parkeringstekst under adressen"}
          - label: "Åbningstider"
            name: "hours"
            widget: "list"
            hint: "Vises i footer og på kontaktsiden — tilføj, fjern eller rediger dage frit"
            fields:
              - {label: "Dag", name: "day", widget: "string"}
              - {label: "Tid", name: "time", widget: "string", hint: "F.eks. '10:00 – 17:00' eller 'Lukket'"}
          - label: "Footer"
            name: "footer"
            widget: "object"
            collapsed: true
            hint: "Tekster nederst på alle sider"
            fields:
              - {label: "Slagord", name: "tagline", widget: "string", hint: "Den lille beskrivende tekst i footerens venstre side"}
              - {label: "CTA overskrift", name: "cta_heading", widget: "string", hint: "Overskriften i den grønne opfordringsboks"}
              - {label: "CTA undertekst", name: "cta_subtext", widget: "string", hint: "Teksten under overskriften i den grønne boks"}
              - {label: "CTA knaptekst", name: "cta_button", widget: "string", hint: "Teksten på knappen i den grønne boks"}
              - {label: "Copyright", name: "copyright", widget: "string", hint: "Teksten helt nederst (årstal + CVR)"}

  - name: "pages"
    label: "Sider"
    editor:
      preview: false
    files:
      - name: "index"
        label: "Forside"
        file: "content/index.json"
        format: json
        fields:
          - label: "Hero"
            name: "hero"
            widget: "object"
            collapsed: true
            hint: "Det første der ses når siden åbnes"
            fields:
              - {label: "Lille label", name: "label", widget: "string", hint: "Den lille tekst øverst (f.eks. 'Fra hjerte til hjerte')"}
              - {label: "Overskrift", name: "heading", widget: "string", hint: "Sidens store hovedoverskrift"}
              - {label: "Brødtekst", name: "body", widget: "markdown", hint: "Den korte velkomsttekst under overskriften"}
              - {label: "Primær knap", name: "cta_primary", widget: "string", hint: "Teksten på den mørke knap"}
              - {label: "Sekundær knap", name: "cta_secondary", widget: "string", hint: "Teksten på den lyse knap"}
              - {label: "Hero-billede", name: "image", widget: "image", required: false, hint: "Det store billede bag teksten øverst på forsiden"}
          - label: "Stress-sektion"
            name: "stress"
            widget: "object"
            collapsed: true
            hint: "Sektionen om stressforløb midt på forsiden"
            fields:
              - {label: "Label", name: "label", widget: "string", hint: "Den lille tekst over overskriften"}
              - {label: "Overskrift", name: "heading", widget: "string"}
              - {label: "Intro", name: "intro", widget: "markdown", hint: "Introduktionsteksten under overskriften"}
              - label: "Kort: Privatpersoner"
                name: "card_private"
                widget: "object"
                collapsed: true
                fields:
                  - {label: "Overskrift", name: "heading", widget: "string"}
                  - {label: "Beskrivelse", name: "body", widget: "markdown"}
                  - {label: "Knap", name: "cta", widget: "string"}
              - label: "Kort: Ledere & Virksomheder"
                name: "card_business"
                widget: "object"
                collapsed: true
                fields:
                  - {label: "Overskrift", name: "heading", widget: "string"}
                  - {label: "Beskrivelse", name: "body", widget: "markdown"}
                  - {label: "Knap", name: "cta", widget: "string"}
          - label: "Høj begavelse-sektion"
            name: "gifted"
            widget: "object"
            collapsed: true
            hint: "Sektionen om høj begavelse og Gifted Children"
            fields:
              - {label: "Label", name: "label", widget: "string"}
              - {label: "Overskrift", name: "heading", widget: "string"}
              - {label: "Manchet", name: "lead", widget: "markdown", hint: "Den fremhævede indledende tekst"}
              - {label: "Brødtekst", name: "body", widget: "markdown"}
              - {label: "Knap", name: "cta", widget: "string"}
              - {label: "Billede", name: "image", widget: "image", required: false, hint: "Billedet i sektionen om høj begavelse"}
          - label: "Børn-sektion"
            name: "children"
            widget: "object"
            collapsed: true
            hint: "Sektionen om børnefysioterapi"
            fields:
              - {label: "Label", name: "label", widget: "string"}
              - {label: "Overskrift", name: "heading", widget: "string"}
              - {label: "Manchet", name: "lead", widget: "markdown"}
              - {label: "Punkt 1", name: "bullet1", widget: "string"}
              - {label: "Punkt 2", name: "bullet2", widget: "string"}
              - {label: "Knap", name: "cta", widget: "string"}
              - {label: "Billede", name: "image", widget: "image", required: false, hint: "Billedet i børnefysioterapisektionen"}
          - label: "Ydelser"
            name: "services"
            widget: "object"
            collapsed: true
            hint: "De tre ydelseskort (Fysioterapi, Yogaterapi, GLA:D)"
            fields:
              - {label: "Label", name: "label", widget: "string"}
              - {label: "Overskrift", name: "heading", widget: "string"}
              - {label: "Intro", name: "intro", widget: "markdown"}
              - {label: "Ydelse 1 titel", name: "item1_title", widget: "string"}
              - {label: "Ydelse 1 tekst", name: "item1_body", widget: "markdown"}
              - {label: "Ydelse 2 titel", name: "item2_title", widget: "string"}
              - {label: "Ydelse 2 tekst", name: "item2_body", widget: "markdown"}
              - {label: "Ydelse 3 titel", name: "item3_title", widget: "string"}
              - {label: "Ydelse 3 tekst", name: "item3_body", widget: "markdown"}
          - label: "Udtalelser"
            name: "testimonials"
            widget: "object"
            collapsed: true
            hint: "Klientudtalelser på forsiden"
            fields:
              - {label: "Overskrift", name: "heading", widget: "string"}
              - {label: "Intro", name: "intro", widget: "markdown"}
              - {label: "Udtalelse 1 citat", name: "item0_quote", widget: "text"}
              - {label: "Udtalelse 1 navn", name: "item0_name", widget: "string"}
              - {label: "Udtalelse 2 citat", name: "item1_quote", widget: "text"}
              - {label: "Udtalelse 2 navn", name: "item1_name", widget: "string"}
              - {label: "Udtalelse 3 citat", name: "item2_quote", widget: "text"}
              - {label: "Udtalelse 3 navn", name: "item2_name", widget: "string"}
          - label: "Forløb (trin)"
            name: "process"
            widget: "object"
            collapsed: true
            hint: "De fire trin i forløbet"
            fields:
              - {label: "Label", name: "label", widget: "string"}
              - {label: "Overskrift", name: "heading", widget: "string"}
              - {label: "Intro", name: "intro", widget: "markdown"}
              - {label: "Trin 1 titel", name: "step1_title", widget: "string"}
              - {label: "Trin 1 tekst", name: "step1_body", widget: "markdown"}
              - {label: "Trin 2 titel", name: "step2_title", widget: "string"}
              - {label: "Trin 2 tekst", name: "step2_body", widget: "markdown"}
              - {label: "Trin 3 titel", name: "step3_title", widget: "string"}
              - {label: "Trin 3 tekst", name: "step3_body", widget: "markdown"}
              - {label: "Trin 4 titel", name: "step4_title", widget: "string"}
              - {label: "Trin 4 tekst", name: "step4_body", widget: "markdown"}
          - label: "CTA-sektion"
            name: "cta"
            widget: "object"
            collapsed: true
            hint: "Den grønne opfordringssektion"
            fields:
              - {label: "Overskrift", name: "heading", widget: "string"}
              - {label: "Tekst", name: "body", widget: "markdown"}
              - {label: "Primær knap", name: "cta_primary", widget: "string"}
              - {label: "Sekundær knap", name: "cta_secondary", widget: "string"}
          - label: "Om-preview"
            name: "about_preview"
            widget: "object"
            collapsed: true
            hint: "Den lille 'Om mig'-sektion nær bunden af forsiden"
            fields:
              - {label: "Label", name: "label", widget: "string"}
              - {label: "Overskrift", name: "heading", widget: "string"}
              - {label: "Baggrund", name: "background", widget: "markdown"}
              - {label: "Tilgang", name: "approach", widget: "markdown"}
              - {label: "Profilbillede", name: "image", widget: "image", required: false, hint: "Birgittes profilbillede på forsiden"}

      - name: "priser"
        label: "Priser"
        file: "content/priser.json"
        format: json
        fields:
          - label: "Hero"
            name: "hero"
            widget: "object"
            collapsed: true
            fields:
              - {label: "Label", name: "label", widget: "string"}
              - {label: "Overskrift", name: "heading", widget: "string"}
              - {label: "Tagline", name: "tagline", widget: "string"}
              - {label: "Baggrundsbillede", name: "bg_image", widget: "image", required: false, hint: "Billedet bag overskriften øverst på siden"}
          - label: "Gitter-overskrift"
            name: "grid"
            widget: "object"
            collapsed: true
            fields:
              - {label: "Label", name: "label", widget: "string"}
              - {label: "Overskrift", name: "heading", widget: "string"}
          - label: "Priskategorier"
            name: "categories"
            widget: "list"
            hint: "Tilføj, fjern eller omdøb kategorier og priser frit"
            fields:
              - {label: "Kategorinavn", name: "title", widget: "string"}
              - label: "Priser"
                name: "rows"
                widget: "list"
                fields:
                  - {label: "Ydelse / varighed", name: "name", widget: "string"}
                  - {label: "Undertitel (valgfri)", name: "subtitle", widget: "string", required: false}
                  - {label: "Pris", name: "price", widget: "string", hint: "F.eks. '650 kr.'"}
          - label: "Praktisk info"
            name: "praktisk"
            widget: "object"
            collapsed: true
            hint: "Afbestilling og tilskudsinfo under pristabellen"
            fields:
              - {label: "Label", name: "label", widget: "string"}
              - {label: "Overskrift", name: "heading", widget: "string"}
              - {label: "Afbestilling titel", name: "cancellation_title", widget: "string"}
              - {label: "Afbestilling tekst", name: "cancellation_body", widget: "markdown"}
              - {label: "Tilskud titel", name: "subsidy_title", widget: "string"}
              - {label: "Tilskud tekst", name: "subsidy_body", widget: "markdown"}
          - label: "CTA"
            name: "cta"
            widget: "object"
            collapsed: true
            fields:
              - {label: "Overskrift", name: "heading", widget: "string"}
              - {label: "Tekst", name: "body", widget: "markdown"}
              - {label: "Knap", name: "button", widget: "string"}

      - name: "om"
        label: "Om mig"
        file: "content/om.json"
        format: json
        fields:
          - label: "Hero"
            name: "hero"
            widget: "object"
            collapsed: true
            fields:
              - {label: "Label", name: "label", widget: "string"}
              - {label: "Overskrift", name: "heading", widget: "string"}
              - {label: "Tagline", name: "tagline", widget: "string"}
              - {label: "Baggrundsbillede", name: "bg_image", widget: "image", required: false, hint: "Billedet bag overskriften øverst på siden"}
          - label: "Intro"
            name: "intro"
            widget: "object"
            collapsed: true
            hint: "Den personlige introduktion øverst på siden"
            fields:
              - {label: "Label", name: "label", widget: "string"}
              - {label: "Overskrift", name: "heading", widget: "string"}
              - {label: "Profilbillede", name: "image", widget: "image", required: false, hint: "Birgittes profilbillede"}
              - {label: "Afsnit 1", name: "para1", widget: "markdown"}
              - {label: "Afsnit 2", name: "para2", widget: "markdown"}
              - {label: "Afsnit 3", name: "para3", widget: "markdown"}
              - {label: "Citat", name: "blockquote", widget: "markdown", hint: "Det fremhævede citat i boksen"}
          - label: "Uddannelse & erfaring"
            name: "education"
            widget: "object"
            collapsed: true
            hint: "De fem kompetence-/uddannelseskort"
            fields:
              - {label: "Label", name: "label", widget: "string"}
              - {label: "Overskrift", name: "heading", widget: "string"}
              - {label: "Kompetence 1 titel", name: "credential0_title", widget: "string"}
              - {label: "Kompetence 1 tekst", name: "credential0_body", widget: "markdown"}
              - {label: "Kompetence 2 titel", name: "credential1_title", widget: "string"}
              - {label: "Kompetence 2 tekst", name: "credential1_body", widget: "markdown"}
              - {label: "Kompetence 3 titel", name: "credential2_title", widget: "string"}
              - {label: "Kompetence 3 tekst", name: "credential2_body", widget: "markdown"}
              - {label: "Kompetence 4 titel", name: "credential3_title", widget: "string"}
              - {label: "Kompetence 4 tekst", name: "credential3_body", widget: "markdown"}
              - {label: "Kompetence 5 titel", name: "credential4_title", widget: "string"}
              - {label: "Kompetence 5 tekst", name: "credential4_body", widget: "markdown"}
          - label: "Videoer"
            name: "videos"
            widget: "object"
            collapsed: true
            hint: "Billedteksterne under de to videoer"
            fields:
              - {label: "Label", name: "label", widget: "string"}
              - {label: "Overskrift", name: "heading", widget: "string"}
              - {label: "Video 1 tekst", name: "video1_caption", widget: "markdown"}
              - {label: "Video 2 tekst", name: "video2_caption", widget: "markdown"}
          - label: "Værdier"
            name: "values"
            widget: "object"
            collapsed: true
            hint: "De tre værdikort"
            fields:
              - {label: "Label", name: "label", widget: "string"}
              - {label: "Overskrift", name: "heading", widget: "string"}
              - {label: "Værdi 1 titel", name: "value1_title", widget: "string"}
              - {label: "Værdi 1 tekst", name: "value1_body", widget: "markdown"}
              - {label: "Værdi 2 titel", name: "value2_title", widget: "string"}
              - {label: "Værdi 2 tekst", name: "value2_body", widget: "markdown"}
              - {label: "Værdi 3 titel", name: "value3_title", widget: "string"}
              - {label: "Værdi 3 tekst", name: "value3_body", widget: "markdown"}
          - label: "Udtalelser"
            name: "testimonials"
            widget: "object"
            collapsed: true
            fields:
              - {label: "Label", name: "label", widget: "string"}
              - {label: "Overskrift", name: "heading", widget: "string"}
              - {label: "Udtalelse 1 citat", name: "item0_quote", widget: "text"}
              - {label: "Udtalelse 1 navn", name: "item0_name", widget: "string"}
              - {label: "Udtalelse 2 citat", name: "item1_quote", widget: "text"}
              - {label: "Udtalelse 2 navn", name: "item1_name", widget: "string"}
              - {label: "Udtalelse 3 citat", name: "item2_quote", widget: "text"}
              - {label: "Udtalelse 3 navn", name: "item2_name", widget: "string"}
          - label: "CTA"
            name: "cta"
            widget: "object"
            collapsed: true
            fields:
              - {label: "Overskrift", name: "heading", widget: "string"}
              - {label: "Tekst", name: "body", widget: "markdown"}
              - {label: "Knap", name: "button", widget: "string"}

      - name: "kontakt"
        label: "Kontakt"
        file: "content/kontakt.json"
        format: json
        fields:
          - label: "Hero"
            name: "hero"
            widget: "object"
            collapsed: true
            fields:
              - {label: "Label", name: "label", widget: "string"}
              - {label: "Overskrift", name: "heading", widget: "string"}
              - {label: "Tagline", name: "tagline", widget: "string"}
          - label: "Kontaktformular"
            name: "form"
            widget: "object"
            collapsed: true
            fields:
              - {label: "Overskrift", name: "heading", widget: "string"}
              - {label: "Intro", name: "intro", widget: "markdown"}
              - {label: "Billede-overlay tekst", name: "image_overlay_heading", widget: "string", hint: "Teksten der vises oven på billedet"}
              - {label: "Billede", name: "image", widget: "image", required: false, hint: "Billedet til højre i kontaktformularen"}
              - {label: "Succesbesked", name: "success_message", widget: "markdown", hint: "Vises når formularen er sendt"}
          - label: "Adresse & info"
            name: "address"
            widget: "object"
            collapsed: true
            fields:
              - {label: "Overskrift", name: "heading", widget: "string"}
          - label: "Åbningstider (visning)"
            name: "hours"
            widget: "list"
            hint: "Åbningstider til visning på kontaktsiden"
            fields:
              - {label: "Dag", name: "day", widget: "string"}
              - {label: "Tid", name: "time", widget: "string"}

      - name: "evalueringer"
        label: "Evalueringer"
        file: "content/evalueringer.json"
        format: json
        fields:
          - label: "Hero"
            name: "hero"
            widget: "object"
            collapsed: true
            fields:
              - {label: "Label", name: "label", widget: "string"}
              - {label: "Overskrift", name: "heading", widget: "string"}
              - {label: "Tagline", name: "tagline", widget: "string"}
              - {label: "Baggrundsbillede", name: "bg_image", widget: "image", required: false, hint: "Billedet bag overskriften øverst på siden"}
          - label: "Intro"
            name: "intro"
            widget: "object"
            collapsed: true
            fields:
              - {label: "Label", name: "label", widget: "string"}
              - {label: "Overskrift", name: "heading", widget: "string"}
              - {label: "Tekst", name: "body", widget: "markdown"}
          - label: "Anmeldelser"
            name: "reviews"
            widget: "list"
            hint: "Tilføj eller fjern anmeldelser frit"
            fields:
              - {label: "Citat", name: "quote", widget: "text", hint: "Selve anmeldelsesteksten"}
              - {label: "Rolle / titel", name: "role", widget: "string", hint: "F.eks. 'Deltager' eller 'Leder, IT-virksomhed'"}
              - {label: "Organisation", name: "organization", widget: "string"}
          - label: "Tilbage-sektion"
            name: "back"
            widget: "object"
            collapsed: true
            fields:
              - {label: "Tekst", name: "body", widget: "markdown"}
              - {label: "Knap", name: "cta", widget: "string"}

      - name: "stress"
        label: "Stressforløb (privat)"
        file: "content/stress.json"
        format: json
        fields:
          - label: "Hero"
            name: "hero"
            widget: "object"
            collapsed: true
            fields:
              - {label: "Label", name: "label", widget: "string"}
              - {label: "Overskrift", name: "heading", widget: "string"}
              - {label: "Tagline", name: "tagline", widget: "string"}
              - {label: "Baggrundsbillede", name: "bg_image", widget: "image", required: false, hint: "Billedet bag overskriften øverst på siden"}
          - label: "Intro"
            name: "intro"
            widget: "object"
            collapsed: true
            fields:
              - {label: "Label", name: "label", widget: "string"}
              - {label: "Overskrift", name: "heading", widget: "string"}
              - {label: "Billede", name: "image", widget: "image", required: false, hint: "Billedet i introduktionssektionen"}
              - {label: "Afsnit 1", name: "para1", widget: "markdown"}
              - {label: "Afsnit 2", name: "para2", widget: "markdown"}
              - {label: "Knap", name: "cta", widget: "string"}
          - label: "Tegn på stress"
            name: "signs"
            widget: "object"
            collapsed: true
            hint: "De fem symptomer/tegn på stress"
            fields:
              - {label: "Label", name: "label", widget: "string"}
              - {label: "Overskrift", name: "heading", widget: "string"}
              - {label: "Tegn 1", name: "sign1", widget: "string"}
              - {label: "Tegn 2", name: "sign2", widget: "string"}
              - {label: "Tegn 3", name: "sign3", widget: "string"}
              - {label: "Tegn 4", name: "sign4", widget: "string"}
              - {label: "Tegn 5", name: "sign5", widget: "string"}
          - label: "Tilgang"
            name: "approach"
            widget: "object"
            collapsed: true
            hint: "De fire behandlingsmetoder"
            fields:
              - {label: "Label", name: "label", widget: "string"}
              - {label: "Overskrift", name: "heading", widget: "string"}
              - {label: "Metode 1 titel", name: "method1_title", widget: "string"}
              - {label: "Metode 1 tekst", name: "method1_body", widget: "markdown"}
              - {label: "Metode 2 titel", name: "method2_title", widget: "string"}
              - {label: "Metode 2 tekst", name: "method2_body", widget: "markdown"}
              - {label: "Metode 3 titel", name: "method3_title", widget: "string"}
              - {label: "Metode 3 tekst", name: "method3_body", widget: "markdown"}
              - {label: "Metode 4 titel", name: "method4_title", widget: "string"}
              - {label: "Metode 4 tekst", name: "method4_body", widget: "markdown"}
          - label: "Forløb"
            name: "process"
            widget: "object"
            collapsed: true
            fields:
              - {label: "Label", name: "label", widget: "string"}
              - {label: "Overskrift", name: "heading", widget: "string"}
              - {label: "Trin 1 titel", name: "step1_title", widget: "string"}
              - {label: "Trin 1 tekst", name: "step1_body", widget: "markdown"}
              - {label: "Trin 2 titel", name: "step2_title", widget: "string"}
              - {label: "Trin 2 tekst", name: "step2_body", widget: "markdown"}
              - {label: "Trin 3 titel", name: "step3_title", widget: "string"}
              - {label: "Trin 3 tekst", name: "step3_body", widget: "markdown"}
              - {label: "Trin 4 titel", name: "step4_title", widget: "string"}
              - {label: "Trin 4 tekst", name: "step4_body", widget: "markdown"}
              - {label: "Stresstest note", name: "stresstest_note", widget: "markdown", hint: "Noten om den gratis stresstest"}
          - label: "CTA"
            name: "cta"
            widget: "object"
            collapsed: true
            fields:
