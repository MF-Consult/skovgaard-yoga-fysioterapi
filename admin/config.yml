backend:
  name: git-gateway
  branch: main

locale: da

media_folder: "Assets"
public_folder: "/Assets"

collections:
  - name: "global"
    label: "Globalt indhold"
    files:
      - name: "global"
        label: "Kontaktinfo, åbningstider & footer"
        file: "content/global.json"
        format: json
        fields:
          - label: "Kontaktoplysninger"
            name: "contact"
            widget: "object"
            fields:
              - {label: "Telefon", name: "phone", widget: "string"}
              - {label: "E-mail", name: "email", widget: "string"}
              - {label: "Adresse", name: "address", widget: "string"}
              - {label: "Parkeringsnote", name: "parking", widget: "string"}
          - label: "Åbningstider"
            name: "hours"
            widget: "list"
            fields:
              - {label: "Dag", name: "day", widget: "string"}
              - {label: "Tid", name: "time", widget: "string"}
          - label: "Footer"
            name: "footer"
            widget: "object"
            fields:
              - {label: "Slagord", name: "tagline", widget: "string"}
              - {label: "CTA overskrift", name: "cta_heading", widget: "string"}
              - {label: "CTA undertekst", name: "cta_subtext", widget: "string"}
              - {label: "CTA knaptekst", name: "cta_button", widget: "string"}
              - {label: "Copyright", name: "copyright", widget: "string"}

  - name: "pages"
    label: "Sider"
    files:
      - name: "index"
        label: "Forside"
        file: "content/index.json"
        format: json
        fields:
          - label: "Hero"
            name: "hero"
            widget: "object"
            fields:
              - {label: "Lille label", name: "label", widget: "string"}
              - {label: "Overskrift", name: "heading", widget: "string"}
              - {label: "Brødtekst", name: "body", widget: "text"}
              - {label: "Primær knap", name: "cta_primary", widget: "string"}
              - {label: "Sekundær knap", name: "cta_secondary", widget: "string"}
          - label: "Stress-sektion"
            name: "stress"
            widget: "object"
            fields:
              - {label: "Label", name: "label", widget: "string"}
              - {label: "Overskrift", name: "heading", widget: "string"}
              - {label: "Intro", name: "intro", widget: "text"}
              - label: "Kort: Privat"
                name: "card_private"
                widget: "object"
                fields:
                  - {label: "Overskrift", name: "heading", widget: "string"}
                  - {label: "Beskrivelse", name: "body", widget: "text"}
                  - {label: "Knap", name: "cta", widget: "string"}
              - label: "Kort: Erhverv"
                name: "card_business"
                widget: "object"
                fields:
                  - {label: "Overskrift", name: "heading", widget: "string"}
                  - {label: "Beskrivelse", name: "body", widget: "text"}
                  - {label: "Knap", name: "cta", widget: "string"}
          - label: "Høj begavelse-sektion"
            name: "gifted"
            widget: "object"
            fields:
              - {label: "Label", name: "label", widget: "string"}
              - {label: "Overskrift", name: "heading", widget: "string"}
              - {label: "Manchet", name: "lead", widget: "text"}
              - {label: "Brødtekst", name: "body", widget: "text"}
              - {label: "Knap", name: "cta", widget: "string"}
          - label: "Børn-sektion"
            name: "children"
            widget: "object"
            fields:
              - {label: "Label", name: "label", widget: "string"}
              - {label: "Overskrift", name: "heading", widget: "string"}
              - {label: "Manchet", name: "lead", widget: "text"}
              - {label: "Punkt 1", name: "bullet1", widget: "string"}
              - {label: "Punkt 2", name: "bullet2", widget: "string"}
              - {label: "Knap", name: "cta", widget: "string"}
          - label: "Ydelser"
            name: "services"
            widget: "object"
            fields:
              - {label: "Label", name: "label", widget: "string"}
              - {label: "Overskrift", name: "heading", widget: "string"}
              - {label: "Intro", name: "intro", widget: "text"}
              - {label: "Ydelse 1 titel", name: "item1_title", widget: "string"}
              - {label: "Ydelse 1 tekst", name: "item1_body", widget: "text"}
              - {label: "Ydelse 2 titel", name: "item2_title", widget: "string"}
              - {label: "Ydelse 2 tekst", name: "item2_body", widget: "text"}
              - {label: "Ydelse 3 titel", name: "item3_title", widget: "string"}
              - {label: "Ydelse 3 tekst", name: "item3_body", widget: "text"}
          - label: "Udtalelser"
            name: "testimonials"
            widget: "object"
            fields:
              - {label: "Overskrift", name: "heading", widget: "string"}
              - {label: "Intro", name: "intro", widget: "text"}
              - {label: "Udtalelse 1 citat", name: "item0_quote", widget: "text"}
              - {label: "Udtalelse 1 navn", name: "item0_name", widget: "string"}
              - {label: "Udtalelse 2 citat", name: "item1_quote", widget: "text"}
              - {label: "Udtalelse 2 navn", name: "item1_name", widget: "string"}
              - {label: "Udtalelse 3 citat", name: "item2_quote", widget: "text"}
              - {label: "Udtalelse 3 navn", name: "item2_name", widget: "string"}
          - label: "Forløb (trin)"
            name: "process"
            widget: "object"
            fields:
              - {label: "Label", name: "label", widget: "string"}
              - {label: "Overskrift", name: "heading", widget: "string"}
              - {label: "Intro", name: "intro", widget: "text"}
              - {label: "Trin 1 titel", name: "step1_title", widget: "string"}
              - {label: "Trin 1 tekst", name: "step1_body", widget: "text"}
              - {label: "Trin 2 titel", name: "step2_title", widget: "string"}
              - {label: "Trin 2 tekst", name: "step2_body", widget: "text"}
              - {label: "Trin 3 titel", name: "step3_title", widget: "string"}
              - {label: "Trin 3 tekst", name: "step3_body", widget: "text"}
              - {label: "Trin 4 titel", name: "step4_title", widget: "string"}
              - {label: "Trin 4 tekst", name: "step4_body", widget: "text"}
          - label: "CTA-sektion"
            name: "cta"
            widget: "object"
            fields:
              - {label: "Overskrift", name: "heading", widget: "string"}
              - {label: "Tekst", name: "body", widget: "text"}
              - {label: "Primær knap", name: "cta_primary", widget: "string"}
              - {label: "Sekundær knap", name: "cta_secondary", widget: "string"}
          - label: "Om-preview"
            name: "about_preview"
            widget: "object"
            fields:
              - {label: "Label", name: "label", widget: "string"}
              - {label: "Overskrift", name: "heading", widget: "string"}
              - {label: "Baggrund", name: "background", widget: "text"}
              - {label: "Tilgang", name: "approach", widget: "text"}

      - name: "priser"
        label: "Priser"
        file: "content/priser.json"
        format: json
        fields:
          - label: "Hero"
            name: "hero"
            widget: "object"
            fields:
              - {label: "Label", name: "label", widget: "string"}
              - {label: "Overskrift", name: "heading", widget: "string"}
              - {label: "Tagline", name: "tagline", widget: "string"}
          - label: "Gitter-overskrift"
            name: "grid"
            widget: "object"
            fields:
              - {label: "Label", name: "label", widget: "string"}
              - {label: "Overskrift", name: "heading", widget: "string"}
          - label: "Priskategorier"
            name: "categories"
            widget: "list"
            fields:
              - {label: "Kategorinavn", name: "title", widget: "string"}
              - label: "Priser"
                name: "rows"
                widget: "list"
                fields:
                  - {label: "Ydelse / varighed", name: "name", widget: "string"}
                  - {label: "Undertitel (valgfri)", name: "subtitle", widget: "string", required: false}
                  - {label: "Pris", name: "price", widget: "string"}
          - label: "Praktisk info"
            name: "praktisk"
            widget: "object"
            fields:
              - {label: "Label", name: "label", widget: "string"}
              - {label: "Overskrift", name: "heading", widget: "string"}
              - {label: "Afbestilling titel", name: "cancellation_title", widget: "string"}
              - {label: "Afbestilling tekst", name: "cancellation_body", widget: "text"}
              - {label: "Tilskud titel", name: "subsidy_title", widget: "string"}
              - {label: "Tilskud tekst", name: "subsidy_body", widget: "text"}
          - label: "CTA"
            name: "cta"
            widget: "object"
            fields:
              - {label: "Overskrift", name: "heading", widget: "string"}
              - {label: "Tekst", name: "body", widget: "text"}
              - {label: "Knap", name: "button", widget: "string"}

      - name: "om"
        label: "Om mig"
        file: "content/om.json"
        format: json
        fields:
          - label: "Hero"
            name: "hero"
            widget: "object"
            fields:
              - {label: "Label", name: "label", widget: "string"}
              - {label: "Overskrift", name: "heading", widget: "string"}
              - {label: "Tagline", name: "tagline", widget: "string"}
          - label: "Intro"
            name: "intro"
            widget: "object"
            fields:
              - {label: "Label", name: "label", widget: "string"}
              - {label: "Overskrift", name: "heading", widget: "string"}
              - {label: "Afsnit 1", name: "para1", widget: "text"}
              - {label: "Afsnit 2", name: "para2", widget: "text"}
              - {label: "Afsnit 3", name: "para3", widget: "text"}
              - {label: "Citat", name: "blockquote", widget: "text"}
          - label: "Uddannelse & erfaring"
