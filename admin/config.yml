              - {label: "Overskrift", name: "heading", widget: "string"}
              - {label: "Kompetence 1 titel", name: "credential0_title", widget: "string"}
              - {label: "Kompetence 1 tekst", name: "credential0_body", widget: "text"}
              - {label: "Kompetence 2 titel", name: "credential1_title", widget: "string"}
              - {label: "Kompetence 2 tekst", name: "credential1_body", widget: "text"}
              - {label: "Kompetence 3 titel", name: "credential2_title", widget: "string"}
              - {label: "Kompetence 3 tekst", name: "credential2_body", widget: "text"}
              - {label: "Kompetence 4 titel", name: "credential3_title", widget: "string"}
              - {label: "Kompetence 4 tekst", name: "credential3_body", widget: "text"}
              - {label: "Kompetence 5 titel", name: "credential4_title", widget: "string"}
              - {label: "Kompetence 5 tekst", name: "credential4_body", widget: "text"}
          - label: "Videoer"
            name: "videos"
            widget: "object"
            fields:
              - {label: "Label", name: "label", widget: "string"}
              - {label: "Overskrift", name: "heading", widget: "string"}
              - {label: "Video 1 tekst", name: "video1_caption", widget: "text"}
              - {label: "Video 2 tekst", name: "video2_caption", widget: "text"}
          - label: "Værdier"
            name: "values"
            widget: "object"
            fields:
              - {label: "Label", name: "label", widget: "string"}
              - {label: "Overskrift", name: "heading", widget: "string"}
              - {label: "Værdi 1 titel", name: "value1_title", widget: "string"}
              - {label: "Værdi 1 tekst", name: "value1_body", widget: "text"}
              - {label: "Værdi 2 titel", name: "value2_title", widget: "string"}
              - {label: "Værdi 2 tekst", name: "value2_body", widget: "text"}
              - {label: "Værdi 3 titel", name: "value3_title", widget: "string"}
              - {label: "Værdi 3 tekst", name: "value3_body", widget: "text"}
          - label: "Udtalelser"
            name: "testimonials"
            widget: "object"
            fields:
              - {label: "Label", name: "label", widget: "string"}
              - {label: "Overskrift", name: "heading", widget: "string"}
              - {label: "Udtalelse 1 citat", name: "item0_quote", widget: "text"}
              - {label: "Udtalelse 1 navn", name: "item0_name", widget: "string"}
              - {label: "Udtalelse 2 citat", name: "item1_quote", widget: "text"}
              - {label: "Udtalelse 2 navn", name: "item1_name", widget: "string"}
              - {label: "Udtalelse 3 citat", name: "item2_quote", widget: "text"}
              - {label: "Udtalelse 3 navn", name: "item2_name", widget: "string"}
          - label: "CTA"
            name: "cta"
            widget: "object"
            fields:
              - {label: "Overskrift", name: "heading", widget: "string"}
              - {label: "Tekst", name: "body", widget: "text"}
              - {label: "Knap", name: "button", widget: "string"}

      - name: "kontakt"
        label: "Kontakt"
        file: "content/kontakt.json"
        format: json
        fields:
          - label: "Hero"
            name: "hero"
            widget: "object"
            fields:
              - {label: "Label", name: "label", widget: "string"}
              - {label: "Overskrift", name: "heading", widget: "string"}
              - {label: "Tagline", name: "tagline", widget: "string"}
          - label: "Kontaktformular"
            name: "form"
            widget: "object"
            fields:
              - {label: "Overskrift", name: "heading", widget: "string"}
              - {label: "Intro", name: "intro", widget: "text"}
              - {label: "Billede-overlay tekst", name: "image_overlay_heading", widget: "string"}
              - {label: "Succesbesked", name: "success_message", widget: "text"}
          - label: "Adresse & info"
            name: "address"
            widget: "object"
            fields:
              - {label: "Overskrift", name: "heading", widget: "string"}
          - label: "Åbningstider (visning)"
            name: "hours"
            widget: "list"
            fields:
              - {label: "Dag", name: "day", widget: "string"}
              - {label: "Tid", name: "time", widget: "string"}

      - name: "evalueringer"
        label: "Evalueringer"
        file: "content/evalueringer.json"
        format: json
        fields:
          - label: "Hero"
            name: "hero"
